version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: zimprep-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password_CHANGE_IN_PRODUCTION
      MONGO_INITDB_DATABASE: zimprep
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - zimprep-network

  redis:
    image: redis:7-alpine
    container_name: zimprep-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zimprep-network
    command: redis-server --appendonly yes

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  zimprep-network:
    driver: bridge
