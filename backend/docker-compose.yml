# ============================================================================
# ZimPrep Backend - Local Development Environment
# ============================================================================
# Phase B5: Complete local development stack with all dependencies
# ============================================================================

version: '3.8'

services:
  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zimprep-api
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+asyncpg://zimprep:zimprep@postgres:5432/zimprep
      - MONGODB_URI=mongodb://mongodb:27017/zimprep
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=dev-secret-min-32-chars-for-local-development-only
      - BILLING_WEBHOOK_SECRET=dev-webhook-secret
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=text
      - AUDIT_MODE=false
    depends_on:
      - postgres
      - mongodb
      - redis
    volumes:
      - ./app:/app/app  # Mount for hot reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: zimprep-postgres
    environment:
      - POSTGRES_USER=zimprep
      - POSTGRES_PASSWORD=zimprep
      - POSTGRES_DB=zimprep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zimprep"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: zimprep-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=zimprep
      - MONGO_INITDB_ROOT_PASSWORD=zimprep
      - MONGO_INITDB_DATABASE=zimprep
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: zimprep-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  default:
    name: zimprep-network
