# ============================================================================
# ZimPrep Backend - Staging Environment
# ============================================================================
# Phase B5: Production-like staging environment for pre-release testing
# ============================================================================

version: '3.8'

services:
  # Backend API (Staging)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zimprep-api-staging
    ports:
      - "8000:8000"
    environment:
      - ENV=staging
      - DATABASE_URL=${DATABASE_URL}
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=${REDIS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - BILLING_WEBHOOK_SECRET=${BILLING_WEBHOOK_SECRET}
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - AUDIT_MODE=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

networks:
  default:
    name: zimprep-staging-network
