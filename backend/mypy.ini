# ZimPrep Backend - MyPy Configuration

[mypy]
# Python version
python_version = 3.12

# Import discovery
files = app/**/*.py
namespace_packages = True
explicit_package_bases = True

# Strictness levels
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

# Error reporting
show_error_codes = True
show_error_context = True
pretty = True

# Untyped definitions
disallow_untyped_defs = False  # Enable gradually
disallow_incomplete_defs = False  # Enable gradually
check_untyped_defs = True
disallow_untyped_calls = False  # Enable gradually

# None/Optional handling
no_implicit_optional = True
strict_optional = True

# Miscellaneous
warn_unused_ignores = True
follow_imports = normal

# Third-party library stubs
[[tool.mypy.overrides]]
module = [
    "motor.*",
    "pymongo.*",
    "jose.*",
    "passlib.*",
    "sentence_transformers.*",
    "structlog.*",
    "prometheus_client.*",
]
ignore_missing_imports = True

# Gradually typed modules (strict checking)
[[tool.mypy.overrides]]
module = [
    "app.api.dependencies.*",
    "app.api.routes.*",
    "app.config.*",
]
disallow_untyped_defs = True
